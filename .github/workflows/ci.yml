name: CI — Lint, Test & Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  api-test:
    name: API — Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nexus_saas_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api-nest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-nest/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/nexus_saas_test
          JWT_SECRET: test_secret_at_least_64_chars_long_for_testing_purposes_only_here
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_PUBLIC_URL: http://localhost:9000
          MINIO_ACCESS_KEY: testkey
          MINIO_SECRET_KEY: testsecret
          MINIO_BUCKET: test-bucket
          STRIPE_SECRET_KEY: stripe_key_placeholder_for_ci
          GROQ_API_KEY: groq_key_placeholder_for_ci
          FRONTEND_URL: http://localhost:5173
          CORS_ORIGINS: http://localhost:5173
          SMTP_HOST: localhost
          SMTP_PORT: "587"
          SMTP_USER: ""
          SMTP_PASS: ""

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/nexus_saas_test
          JWT_SECRET: test_secret_at_least_64_chars_long_for_testing_purposes_only_here
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_PUBLIC_URL: http://localhost:9000
          MINIO_ACCESS_KEY: testkey
          MINIO_SECRET_KEY: testsecret
          MINIO_BUCKET: test-bucket
          STRIPE_SECRET_KEY: stripe_key_placeholder_for_ci
          GROQ_API_KEY: groq_key_placeholder_for_ci
          FRONTEND_URL: http://localhost:5173
          CORS_ORIGINS: http://localhost:5173
          SMTP_HOST: localhost
          SMTP_PORT: "587"
          SMTP_USER: ""
          SMTP_PASS: ""

  ui-build:
    name: UI — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: https://api-nexus.bachdev.bond

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [api-test, ui-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api-nest
          push: false
          tags: nexus-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          push: false
          tags: nexus-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
